<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知海 · 教学资源库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f6f9fc 0%, #e9f0f7 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.5;
            color: #1e293b;
        }

        /* 主卡片容器 — 毛玻璃效果 */
        .app {
            width: 100%;
            max-width: 900px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 56px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.6);
            padding: 40px 30px;
            transition: all 0.3s;
        }

        /* 页面切换 */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .page.active {
            display: flex;
        }

        /* ---------- 首页新样式 ---------- */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .book-avatar {
            width: 160px;
            height: 160px;
            background: linear-gradient(145deg, #1e2b5e, #142047);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 40px -12px #1e2b5e, 0 10px 20px -5px rgba(0,0,0,0.2);
            border: 4px solid rgba(255,255,255,0.8);
            margin: 10px 0 20px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .book-avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 50px -10px #1e2b5e;
        }

        .book-icon {
            width: 80px;
            height: 72px;
            background: #f0f4fa;
            border-radius: 8px 20px 20px 8px;
            box-shadow: inset -6px 0 0 #cbd5e1, 0 12px 18px -10px #0f172a;
            position: relative;
        }
        .book-icon::before {
            content: "";
            position: absolute;
            top: 12px;
            left: 14px;
            width: 40px;
            height: 5px;
            background: #cbd5e1;
            border-radius: 3px;
            box-shadow: 0 14px 0 #cbd5e1, 0 28px 0 #cbd5e1;
        }

        .motto {
            font-size: 2.2rem;
            font-weight: 500;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            padding: 0.8rem 2.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 18px -6px rgba(30,41,59,0.1);
            color: #0f1a2f;
            letter-spacing: 2px;
            margin: 5px 0 15px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .motto:hover {
            background: rgba(255,255,255,0.8);
            box-shadow: 0 12px 24px -8px #1e293b;
            color: #0b1625;
        }

        /* 目录和讯息区域 */
        .home-content {
            width: 100%;
            margin-top: 20px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e2b5e;
            margin: 25px 0 15px;
            padding-left: 10px;
            border-left: 6px solid #1e2b5e;
        }

        .dir-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            margin-bottom: 10px;
        }

        .dir-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(6px);
            padding: 18px 12px;
            border-radius: 36px;
            font-size: 1.4rem;
            font-weight: 540;
            color: #1e293b;
            text-align: center;
            box-shadow: 0 8px 16px -8px rgba(0,20,40,0.1), 0 0 0 1px rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.8);
            cursor: pointer;
            transition: all 0.2s;
        }
        .dir-card:hover {
            background: #1e2b5e;
            color: white;
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px #1e2b5e;
            border-color: transparent;
        }

        .info-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(6px);
            padding: 20px 25px;
            border-radius: 36px;
            margin: 25px 0 10px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 18px -8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .info-icon {
            font-size: 2.2rem;
            background: #1e2b5e20;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e2b5e;
        }
        .info-content {
            flex: 1;
            font-size: 1.2rem;
            color: #2d3a5e;
        }
        .info-content strong {
            color: #1e2b5e;
            font-weight: 600;
        }
        .info-meta {
            font-size: 0.95rem;
            color: #62748c;
            margin-top: 6px;
        }

        .hint {
            color: #5f6b7a;
            font-size: 0.95rem;
            margin-top: 20px;
            border-bottom: 1px dashed #a0b3cc;
            padding-bottom: 4px;
        }

        /* 分类页 & 列表页 样式 (保持不变) */
        .page-title {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e2b5e, #253873);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            border-bottom: 3px solid #a5b4cb;
            padding-bottom: 12px;
            width: fit-content;
        }

        .category-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
            margin: 20px 0 30px;
            width: 100%;
        }
        .category-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(6px);
            padding: 22px 38px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: 540;
            color: #1e293b;
            box-shadow: 0 10px 18px -10px rgba(0,20,40,0.15), 0 0 0 1px rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.8);
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 150px;
            text-align: center;
        }
        .category-card:hover {
            background: #1e2b5e;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 25px 30px -12px #1e2b5e;
            border-color: transparent;
        }

        .book-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 25px 0 30px;
            width: 100%;
        }
        .book-item {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(4px);
            padding: 24px 32px;
            border-radius: 40px;
            font-size: 1.5rem;
            font-weight: 500;
            color: #1e293b;
            box-shadow: 0 8px 16px -8px rgba(0,0,0,0.08), 0 0 0 1px rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.15s;
            min-width: 170px;
            text-align: center;
        }
        .book-item:hover {
            background: #ffffff;
            box-shadow: 0 18px 28px -12px #1e2b5e80;
            color: #1e2b5e;
            transform: scale(1.02);
            border-color: #ffffff;
        }

        .current-category {
            font-size: 1.3rem;
            color: #4b5b73;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            padding: 8px 26px;
            border-radius: 40px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.7);
            letter-spacing: 0.3px;
        }

        .back-button {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.8);
            padding: 12px 36px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #2d3a4f;
            margin-top: 25px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }
        .back-button:hover {
            background: white;
            color: #1e2b5e;
            border-color: #1e2b5e;
            box-shadow: 0 12px 18px -12px #1e2b5e;
        }

        @media (max-width: 550px) {
            .app { padding: 30px 16px; border-radius: 40px; }
            .book-avatar { width: 140px; height: 140px; }
            .book-icon { width: 70px; height: 62px; }
            .book-icon::before { left: 10px; width: 35px; }
            .motto { font-size: 1.8rem; padding: 0.7rem 1.5rem; }
            .dir-grid { grid-template-columns: repeat(2, 1fr); }
            .dir-card { font-size: 1.2rem; padding: 14px 8px; }
            .info-card { flex-direction: column; text-align: center; }
            .info-icon { margin-bottom: 5px; }
            .category-card { font-size: 1.5rem; padding: 16px 24px; min-width: 120px; }
            .book-item { font-size: 1.3rem; padding: 18px 24px; min-width: 140px; }
            .page-title { font-size: 1.9rem; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 页面1：首页 (已扩充) -->
        <div id="page1" class="page active">
            <div class="hero-section">
                <div class="book-avatar" id="goToPage2">
                    <div class="book-icon"></div>
                </div>
                <div class="motto" id="goToPage2Alt">
                    “海纳百川，有容乃大”
                </div>
            </div>

            <div class="home-content">
                <!-- 目录区域 -->
                <div class="section-title">📖 快速导航 · 目录</div>
                <div class="dir-grid" id="homeDirGrid"></div>

                <!-- 讯息区域 -->
                <div class="section-title">📢 最新讯息</div>
                <div class="info-card">
                    <div class="info-icon">📌</div>
                    <div class="info-content">
                        <strong>新增英语听力资料</strong> · 包含三套真题训练
                        <div class="info-meta">2小时前 · 管理员</div>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">📅</div>
                    <div class="info-content">
                        <strong>每日学习提醒</strong> · 今日推荐：古代文学赏析
                        <div class="info-meta">每日更新</div>
                    </div>
                </div>
            </div>
            <div class="hint">点击书本进入全部分类</div>
        </div>

        <!-- 页面2：分类页 (保持不变) -->
        <div id="page2" class="page">
            <h2 class="page-title">📚 学科分类</h2>
            <div class="category-grid" id="categoryContainer"></div>
            <div class="back-button" id="backToPage1">← 返回首页</div>
        </div>

        <!-- 页面3：书本列表页 (保持不变) -->
        <div id="page3" class="page">
            <div class="current-category" id="currentCategoryLabel"></div>
            <h2 class="page-title" id="bookListTitle">教学资料</h2>
            <div class="book-list" id="bookContainer"></div>
            <div class="back-button" id="backToPage2">← 返回分类</div>
        </div>
    </div>

    <script>
        (function() {
            // 分类数据
            const categories = [
                { id: 'eng', name: '英语' },
                { id: 'chi', name: '语文' },
                { id: 'math', name: '数学' },
                { id: 'phy', name: '物理' },
                { id: 'chem', name: '化学' },
                { id: 'hist', name: '历史' }
            ];

            // 各分类下的书本
            const booksData = {
                eng: ['📘 英语精读', '📗 英语语法', '📙 英语听力'],
                chi: ['📖 古代文学', '📕 现代汉语', '📓 作文指南'],
                math: ['📐 高等数学', '📏 线性代数', '🧮 概率统计'],
                phy: ['⚛️ 物理原理', '🔭 天体物理', '💡 实验手册'],
                chem: ['🧪 有机化学', '⚗️ 无机化学', '📊 化学分析'],
                hist: ['🏛️ 世界历史', '🎎 中国通史', '📜 文明简史']
            };

            // DOM 元素
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            const page3 = document.getElementById('page3');
            const categoryContainer = document.getElementById('categoryContainer');
            const bookContainer = document.getElementById('bookContainer');
            const currentCategoryLabel = document.getElementById('currentCategoryLabel');
            const bookListTitle = document.getElementById('bookListTitle');
            const homeDirGrid = document.getElementById('homeDirGrid');

            const goToPage2Btn = document.getElementById('goToPage2');
            const goToPage2Alt = document.getElementById('goToPage2Alt');
            const backToPage1 = document.getElementById('backToPage1');
            const backToPage2 = document.getElementById('backToPage2');

            let currentCategoryId = 'eng';

            // 切换页面
            function showPage(pageNumber) {
                page1.classList.remove('active');
                page2.classList.remove('active');
                page3.classList.remove('active');
                if (pageNumber === 1) page1.classList.add('active');
                else if (pageNumber === 2) page2.classList.add('active');
                else if (pageNumber === 3) {
                    page3.classList.add('active');
                    renderBookList(currentCategoryId);
                }
            }

            // 渲染分类卡片 (页面2)
            function renderCategories() {
                let html = '';
                categories.forEach(cat => {
                    html += `<div class="category-card" data-cat-id="${cat.id}">${cat.name}</div>`;
                });
                categoryContainer.innerHTML = html;

                document.querySelectorAll('#page2 .category-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const catId = card.dataset.catId;
                        currentCategoryId = catId;
                        const catName = categories.find(c => c.id === catId)?.name || '';
                        currentCategoryLabel.textContent = `分类 · ${catName}`;
                        bookListTitle.textContent = `${catName}资料`;
                        showPage(3);
                    });
                });
            }

            // 渲染首页目录卡片 (直接跳转到page3)
            function renderHomeDir() {
                let html = '';
                categories.forEach(cat => {
                    html += `<div class="dir-card" data-cat-id="${cat.id}">${cat.name}</div>`;
                });
                homeDirGrid.innerHTML = html;

                document.querySelectorAll('#homeDirGrid .dir-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const catId = card.dataset.catId;
                        currentCategoryId = catId;
                        const catName = categories.find(c => c.id === catId)?.name || '';
                        currentCategoryLabel.textContent = `分类 · ${catName}`;
                        bookListTitle.textContent = `${catName}资料`;
                        showPage(3);
                    });
                });
            }

            // 渲染书本列表
            function renderBookList(catId) {
                const books = booksData[catId] || ['📌 示例书本A', '📌 示例书本B'];
                let html = '';
                books.forEach(book => {
                    html += `<div class="book-item">${book}</div>`;
                });
                bookContainer.innerHTML = html;
            }

            // 事件绑定
            goToPage2Btn.addEventListener('click', () => showPage(2));
            goToPage2Alt.addEventListener('click', () => showPage(2));
            backToPage1.addEventListener('click', () => showPage(1));
            backToPage2.addEventListener('click', () => showPage(2));

            // 初始化
            renderCategories();
            renderHomeDir();
        })();
    </script>
</body>
</html>
